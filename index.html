```
<style>
    body {
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: #222;
        color: white;
        text-align: center;
    }

    #auth-overlay {
        position: fixed;
        inset: 0;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
    }

    .auth-box {
        background: #222;
        padding: 25px;
        border-radius: 12px;
        width: 280px;
    }

    input {
        width: 90%;
        padding: 10px;
        margin: 8px 0;
    }

    button {
        padding: 10px;
        cursor: pointer;
        width: 100%;
    }

    #top-right-ui {
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .ui-btn {
        width: 50px;
        height: 50px;
    }

    #pfp-wrapper {
        width: 150px;
        height: 150px;
        margin-top: 20px;
    }

    #main-pfp {
        width: 100%;
        border-radius: 50%;
        cursor: pointer;
        position: relative;
    }

    .hidden { display: none; }

    #bomb-container {
        display: none;
        margin-top: 20px;
    }
</style>
```

</head>

<div id="auth-overlay">
    <div class="auth-box">
        <h2>Login</h2>
        <input id="auth-user" placeholder="Username">
        <input id="auth-pass" type="password" placeholder="Password">
        <button onclick="handleAuth()">GO</button>

</div>
