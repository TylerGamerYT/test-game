<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyler's Ultimate Test Site</title>

    <style>
        :root {
            --accent: #f1c40f;
            --bg: #1a1a1a;
            --danger: #d63031;
            --card-orange: #e67e22;
        }

        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
            background-color: #222;
        }

        #auth-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #111;
            z-index: 20000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .auth-box {
            background: #222;
            padding: 30px;
            border-radius: 20px;
            border: 3px solid var(--accent);
            width: 300px;
        }

        .auth-box input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            background: #111;
            border: 1px solid #444;
            color: white;
        }

        .auth-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 10px;
            width: 100%;
            font-weight: bold;
            cursor: pointer;
        }

        #site-title {
            font-size: 3rem;
            font-weight: 900;
            margin-top: 20px;
            cursor: pointer;
        }

        #top-right-ui {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .ui-btn {
            width: 50px;
            height: 50px;
            cursor: pointer;
        }

        #pfp-wrapper {
            width: 160px;
            height: 160px;
        }

        .pfp {
            width: 100%;
            border-radius: 50%;
            border: 6px solid white;
            cursor: pointer;
        }

        #bomb-container {
            display: none;
            flex-direction: column;
            gap: 20px;
            margin-top: 20px;
        }

        .hidden { display: none; }

        #award-card {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-orange);
            color: black;
            padding: 40px;
            border-radius: 30px;
            width: 400px;
            z-index: 9999;
        }
    </style>
</head>

<body>

<!-- LOGIN -->
<div id="auth-overlay">
    <div class="auth-box">
        <h2>Login / Register</h2>
        <input id="auth-user" placeholder="Username">
        <input id="auth-pass" type="password" placeholder="Password">
        <button class="auth-btn" onclick="handleAuth()">GO</button>
        <p id="auth-msg"></p>
    </div>
</div>

<!-- UI -->
<div id="top-right-ui">
    <button class="ui-btn" onclick="toggleAudio()">📻</button>
    <button class="ui-btn" onclick="openLab()">🧪</button>
    <button class="ui-btn" onclick="logout()">🚪</button>
</div>

<h1 id="site-title" onclick="labCounter()">Tyler's Test Site</h1>

<div id="pfp-wrapper">
    <img src="https://github.com/TylerGamerYT.png" class="pfp" id="main-pfp" onclick="toggleDVD()">
</div>

<h2 id="display-username">Tyler</h2>

<!-- STATS -->
<div>
    <p>🏆 BEST: <span id="val-best">0s</span></p>
    <p>🔥 CLOSE: <span id="val-close">0s</span></p>
</div>

<!-- GAME -->
<div id="bomb-container">
    <h2 id="digital-timer">01:00</h2>

    <div id="step-1">
        <input id="input-code" placeholder="----">
    </div>

    <div id="step-2" class="hidden">
        <input type="range" id="slider-freq" min="0" max="100">
        <p id="freq-readout">0%</p>
    </div>

    <div id="step-3" class="hidden">
        <div id="wire-grid"></div>
    </div>

    <div id="step-4" class="hidden">
        <div id="gyro-fill"></div>
    </div>

    <div id="step-5" class="hidden">
        <button onclick="triggerWin()">FINAL</button>
    </div>
</div>

<!-- AWARD -->
<div id="award-card">
    <h1 id="award-main-text"></h1>
    <p id="award-sub-text"></p>
</div>

<!-- LAB -->
<div id="lab-panel"></div>

<!-- SPRITES -->
<div id="sprite-sus">📮</div>
<div id="sprite-bus">🚌💨</div>

<script src="script.js"></script>

</body>
</html>
