<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tyler's Test Site</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
            transition: background-color 1s ease;
            background-color: #2980b9;
        }

        .alert-mode { background-color: #444 !important; }
        .danger-text { color: #ff4b4b !important; font-weight: bold; font-size: 1.8rem; text-transform: uppercase; animation: blink 0.5s infinite; }
        
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .site-title { font-size: 3rem; font-weight: 900; margin-top: 20px; margin-bottom: 30px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        img.pfp { width: 140px; border-radius: 50%; border: 4px solid white; margin-bottom: 10px; }
        .username { font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; display: block; }
        
        p { font-size: 1.1rem; max-width: 600px; line-height: 1.5; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px; transition: all 0.3s; }

        /* --- THE BOMB --- */
        #bomb-wrap { display: none; flex-direction: column; align-items: center; margin-top: 20px; }
        
        #bomb {
            position: relative;
            width: 200px;
            height: 150px;
            background: #d63031;
            border-radius: 10px;
            border-left: 12px solid #b71c1c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }

        #timer {
            background: #111;
            color: #ff0000;
            font-family: 'Courier New', monospace;
            font-size: 2.2rem;
            padding: 5px 20px;
            border: 3px solid #444;
            border-radius: 5px;
            margin-bottom: 10px;
            box-shadow: inset 0 0 10px #000;
        }

        .wire-container { display: flex; gap: 12px; margin-top: 10px; }
        .wire {
            width: 10px;
            height: 45px;
            background: #444;
            cursor: pointer;
            border-radius: 5px;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.3);
            transition: height 0.2s, opacity 0.2s, transform 0.1s;
        }
        .wire:hover { transform: scaleY(1.1); }
        .wire.cut { height: 12px; opacity: 0.2; cursor: default; background: #000 !important; transform: scale(0.9); }

        .particle { position: absolute; background: #222; border: 1px solid #000; pointer-events: none; z-index: 100; }
        .flash { background-color: white !important; transition: none !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="site-title">Tyler's Test Site</div>
    <img src="https://github.com/TylerGamerYT.png" alt="PFP" class="pfp">
    <span class="username">Tyler / TylerGamerYT</span>

    <p id="status-text">
        Hello, I am Tyler, and welcome to my test GitHub.io game thingy. 
        I made this just for fun and to test how to make one and stuff, etc. 
        You could say "lol," anyways, bye I guess.
    </p>

    <div id="bomb-wrap">
        <div id="bomb">
            <div id="timer">01:00</div>
            <div class="wire-container" id="wire-box">
                </div>
        </div>
        <p style="background:none; font-size: 1rem; margin-top: 15px;">SNIP ALL 6 WIRES TO SURVIVE!</p>
    </div>

    <script>
        const statusText = document.getElementById('status-text');
        const bombWrap = document.getElementById('bomb-wrap');
        const timerDisplay = document.getElementById('timer');
        const wireBox = document.getElementById('wire-box');
        const body = document.body;

        let gameActive = false;
        let timeLeft = 60;
        let wiresCut = 0;
        const totalWires = 6;
        const wireColors = ['#e74c3c', '#3498db', '#f1c40f', '#2ecc71', '#9b59b6', '#e67e22'];

        setTimeout(() => {
            startThreat();
        }, 30000);

        function startThreat() {
            statusText.innerHTML = "OH NO THERES A BOMB!!! DISARM IT NOW!!";
            statusText.classList.add('danger-text');
            body.classList.add('alert-mode');
            bombWrap.style.display = 'flex';
            gameActive = true;
            createWires();
            startTimer();
        }

        function createWires() {
            wireBox.innerHTML = '';
            wiresCut = 0;
            for(let i=0; i<totalWires; i++) {
                const w = document.createElement('div');
                w.className = 'wire';
                w.style.backgroundColor = wireColors[i];
                w.onclick = function() {
                    if(!this.classList.contains('cut')) {
                        this.classList.add('cut');
                        wiresCut++;
                        checkWin();
                    }
                };
                wireBox.appendChild(w);
            }
        }

        function startTimer() {
            const countdown = setInterval(() => {
                if(!gameActive) { clearInterval(countdown); return; }
                timeLeft--;
                let displaySecs = timeLeft < 10 ? '0' + timeLeft : timeLeft;
                timerDisplay.innerHTML = `00:${displaySecs}`;
                if(timeLeft <= 0) {
                    clearInterval(countdown);
                    explode();
                }
            }, 1000);
        }

        function checkWin() {
            if(wiresCut === totalWires) {
                gameActive = false;
                statusText.innerHTML = "BOMB DISARMED. Safe for now, User.";
                statusText.classList.remove('danger-text');
                statusText.style.color = "#2ecc71";
                timerDisplay.style.color = "#2ecc71";
                setTimeout(() => { location.reload(); }, 5000);
            }
        }

        function explode() {
            gameActive = false;
            body.classList.add('flash');
            bombWrap.classList.add('hidden');
            for (let i = 0; i < 80; i++) { createDebris(); }
            setTimeout(() => {
                body.classList.remove('flash');
                statusText.innerHTML = "CRITICAL FAILURE. REBOOTING...";
                setTimeout(() => { location.reload(); }, 3000);
            }, 150);
        }

        function createDebris() {
            const part = document.createElement('div');
            part.className = 'particle';
            body.appendChild(part);
            const size = Math.random() * 18 + 4;
            part.style.width = size + 'px';
            part.style.height = size + 'px';
            part.style.left = '50%';
            part.style.top = '60%';
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 25 + 10;
            const vx = Math.cos(angle) * velocity;
            const vy = Math.sin(angle) * velocity;
            let rot = 0;
            let opac = 1;
            function move() {
                part.style.left = (parseFloat(part.style.left) + vx) + 'px';
                part.style.top = (parseFloat(part.style.top) + vy) + 'px';
                rot += 10;
                part.style.transform = `rotate(${rot}deg)`;
                opac -= 0.015;
                part.style.opacity = opac;
                if (opac > 0) requestAnimationFrame(move); else part.remove();
            }
            move();
        }
    </script>
</body>
</html>
