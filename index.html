    body {
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        min-height: 100vh;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        color: white;
        text-align: center;
        overflow-x: hidden;
        transition: background-color 1s ease, color 0.5s ease;
        background-color: #222;
    }

    /* --- AUTH SYSTEM --- */
    #auth-overlay {
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: #111;
        z-index: 20000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }

    .auth-box {
        background: #222;
        padding: 30px;
        border-radius: 20px;
        border: 3px solid var(--accent);
        box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        width: 300px;
    }

    @keyframes boxShake {
        0% { transform: translateX(0); }
        25% { transform: translateX(10px); }
        50% { transform: translateX(-10px); }
        75% { transform: translateX(10px); }
        100% { transform: translateX(0); }
    }

    .auth-box input {
        width: 90%;
        padding: 10px;
        margin: 10px 0;
        background: #111;
        border: 1px solid #444;
        color: white;
        border-radius: 5px;
    }

    .auth-btn {
        background: var(--accent);
        color: black;
        border: none;
        padding: 10px 20px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 5px;
        width: 100%;
        margin-top: 10px;
    }

    /* --- THEMES --- */
    .theme-matrix { --bg: #000; --accent: #0f0; color: #0f0 !important; font-family: 'Courier New', monospace; }
    .theme-cyber { --bg: #2d0036; --accent: #00fff2; color: #00fff2 !important; }
    .theme-gameboy { --bg: #8bac0f; --accent: #306230; color: #306230 !important; }
    .alert-active { background-color: #0f0f0f !important; }

    #site-title {
        font-size: 3.5rem;
        font-weight: 900;
        margin-top: 20px;
        margin-bottom: 5px;
        text-shadow: 0 5px 15px rgba(0,0,0,0.5);
        cursor: pointer;
        user-select: none;
    }

    #top-right-ui {
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        z-index: 1000;
    }

    .ui-btn {
        background: rgba(255,255,255,0.1);
        border: 2px solid rgba(255,255,255,0.2);
        color: white;
        width: 50px;
        height: 50px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 1.5rem;
    }

    #pfp-wrapper {
        position: relative;
        width: 160px;
        height: 160px;
    }

    img.pfp {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        border: 6px solid white;
        cursor: pointer;
    }

    .user-tag {
        font-size: 2.2rem;
        font-weight: 800;
    }

    #bomb-container {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 20px;
        width: 100%;
        max-width: 400px;
    }

    .hidden { display: none !important; }
</style>
