<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tyler's Test Site</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;
            transition: background-color 1s ease;
            background-color: #e67e22; /* Start Orange */
        }

        .bg-blue { background-color: #2980b9; }
        .bg-orange { background-color: #e67e22; }

        .site-title {
            font-size: 3rem;
            font-weight: 900;
            margin-top: 20px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        img.pfp {
            width: 140px;
            border-radius: 50%;
            border: 4px solid white;
            margin-bottom: 10px;
        }

        .username {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 20px;
            display: block;
        }

        p {
            font-size: 1.1rem;
            max-width: 600px;
            line-height: 1.5;
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 10px;
            position: relative;
            z-index: 5;
        }

        /* --- THE BOMB --- */
        #bomb {
            position: relative;
            width: 120px;
            height: 150px;
            background: #d63031;
            border-radius: 10px;
            margin: 40px 0;
            border-left: 10px solid #b71c1c;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        #timer {
            background: #222;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            padding: 5px 10px;
            border: 2px solid #555;
            border-radius: 5px;
            font-weight: bold;
        }

        /* Shrapnel / Metal Parts Style */
        .particle {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #333; /* Dark Grey Metal */
            border: 1px solid #111;
            pointer-events: none;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .shake {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, -1px); }
        }

        .hidden { visibility: hidden; }

        .flash {
            background-color: white !important;
            transition: background-color 0.05s !important;
        }
    </style>
</head>
<body>

    <div class="site-title">Tyler's Test Site</div>

    <img src="https://github.com/TylerGamerYT.png" alt="TylerGamerYT Profile Picture" class="pfp">

    <span class="username">Tyler / TylerGamerYT</span>

    <p>
        Hello, I am Tyler, and welcome to my test GitHub.io game thingy. 
        I made this just for fun and to test how to make one and stuff, etc. 
        You could say "lol," anyways, bye I guess.
    </p>

    <div id="bomb">
        <div id="timer">00:30</div>
    </div>

    <script>
        const timerDisplay = document.getElementById('timer');
        const bomb = document.getElementById('bomb');
        const body = document.body;
        let timeLeft = 30; 
        let isOrange = true;

        function updateTimer() {
            let displaySeconds = timeLeft < 10 ? '0' + timeLeft : timeLeft;
            timerDisplay.innerHTML = `00:${displaySeconds}`;

            if (timeLeft <= 5 && timeLeft > 0) {
                bomb.classList.add('shake');
            }

            if (timeLeft <= 0) {
                explode();
            } else {
                timeLeft--;
            }
        }

        function explode() {
            bomb.classList.remove('shake');
            bomb.classList.add('hidden');
            body.classList.add('flash');

            // Switch background colors
            isOrange = !isOrange;

            // Create 60 debris particles
            for (let i = 0; i < 60; i++) {
                createDebris();
            }

            setTimeout(() => {
                body.classList.remove('flash');
                // Apply the new color after flash
                body.className = isOrange ? 'bg-orange' : 'bg-blue';
                
                setTimeout(() => {
                    bomb.classList.remove('hidden');
                    timeLeft = 30;
                }, 1000);
            }, 150);
        }

        function createDebris() {
            const part = document.createElement('div');
            part.classList.add('particle');
            body.appendChild(part);

            // Make particles look like different sized metal chunks
            const size = Math.random() * 15 + 5;
            part.style.width = size + 'px';
            part.style.height = size + 'px';
            part.style.borderRadius = Math.random() > 0.5 ? '2px' : '50%'; // Mix of squares and circles

            const rect = bomb.getBoundingClientRect();
            part.style.left = (rect.left + rect.width / 2) + 'px';
            part.style.top = (rect.top + rect.height / 2) + 'px';

            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 15 + 10;
            const vx = Math.cos(angle) * velocity;
            const vy = Math.sin(angle) * velocity;
            let rotation = 0;
            const rotSpeed = (Math.random() - 0.5) * 20;

            let opac = 1;
            function move() {
                part.style.left = (parseFloat(part.style.left) + vx) + 'px';
                part.style.top = (parseFloat(part.style.top) + vy) + 'px';
                rotation += rotSpeed;
                part.style.transform = `rotate(${rotation}deg)`;
                
                opac -= 0.015;
                part.style.opacity = opac;

                if (opac > 0) {
                    requestAnimationFrame(move);
                } else {
                    part.remove();
                }
            }
            move();
        }

        setInterval(updateTimer, 1000);
    </script>

</body>
</html>
