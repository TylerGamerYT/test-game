<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tyler's Test Site</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            color: white;
            text-align: center;
            animation: colorChange 10s infinite alternate;
            overflow: hidden;
            transition: background-color 0.1s;
        }

        @keyframes colorChange {
            0% { background-color: #ff4b4b; }
            100% { background-color: #4b7bff; }
        }

        .site-title {
            font-size: 3rem;
            font-weight: 900;
            margin-top: 20px;
            margin-bottom: 30px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        img.pfp {
            width: 140px;
            border-radius: 50%;
            border: 4px solid white;
            margin-bottom: 10px;
        }

        .username {
            font-size: 1.8rem;
            font-weight: bold;
            margin-bottom: 20px;
            display: block;
        }

        p {
            font-size: 1.1rem;
            max-width: 600px;
            line-height: 1.5;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
            position: relative;
            z-index: 5;
        }

        /* --- THE BOMB --- */
        #bomb {
            position: relative;
            width: 120px;
            height: 150px;
            background: #d63031;
            border-radius: 10px;
            margin: 40px 0;
            border-left: 10px solid #b71c1c;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
            z-index: 10;
        }

        #timer {
            background: #222;
            color: #ff0000;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.5rem;
            padding: 5px 10px;
            border: 2px solid #555;
            border-radius: 5px;
            font-weight: bold;
        }

        /* Explosion Particle Style */
        .particle {
            position: absolute;
            width: 10px;
            height: 10px;
            background: yellow;
            border-radius: 50%;
            pointer-events: none;
        }

        /* Shake effect when close to blowing up */
        .shake {
            animation: shake 0.1s infinite;
        }

        @keyframes shake {
            0% { transform: translate(2px, 1px) rotate(0deg); }
            50% { transform: translate(-1px, -2px) rotate(-1deg); }
            100% { transform: translate(1px, -1px) rotate(1deg); }
        }

        .hidden { display: none !important; }

        .flash {
            background-color: white !important;
        }
    </style>
</head>
<body>

    <div class="site-title">Tyler's Test Site</div>

    <img src="https://github.com/TylerGamerYT.png" alt="TylerGamerYT Profile Picture" class="pfp">

    <span class="username">Tyler / TylerGamerYT</span>

    <p id="main-text">
        Hello, I am Tyler, and welcome to my test GitHub.io game thingy. 
        I made this just for fun and to test how to make one and stuff, etc. 
        You could say lol, anyways, bye I guess.
    </p>

    <div id="bomb">
        <div id="timer">00:30</div>
    </div>

    <script>
        const timerDisplay = document.getElementById('timer');
        const bomb = document.getElementById('bomb');
        const body = document.body;
        let timeLeft = 30; 

        function updateTimer() {
            let displaySeconds = timeLeft < 10 ? '0' + timeLeft : timeLeft;
            timerDisplay.innerHTML = `00:${displaySeconds}`;

            // Start shaking when 5 seconds are left
            if (timeLeft <= 5 && timeLeft > 0) {
                bomb.classList.add('shake');
            }

            if (timeLeft <= 0) {
                explode();
            } else {
                timeLeft--;
            }
        }

        function explode() {
            bomb.classList.remove('shake');
            bomb.classList.add('hidden');
            body.classList.add('flash');

            // Create 50 explosion particles
            for (let i = 0; i < 50; i++) {
                createParticle();
            }

            setTimeout(() => {
                body.classList.remove('flash');
                setTimeout(() => {
                    bomb.classList.remove('hidden');
                    timeLeft = 30;
                }, 1000);
            }, 200);
        }

        function createParticle() {
            const particle = document.createElement('div');
            particle.classList.add('particle');
            body.appendChild(particle);

            // Set random colors for fire/smoke
            const colors = ['#ff4b4b', '#ffeb3b', '#ffa500', '#ffffff'];
            particle.style.background = colors[Math.floor(Math.random() * colors.length)];

            // Position particle at the bomb's location
            const rect = bomb.getBoundingClientRect();
            particle.style.left = (rect.left + rect.width / 2) + 'px';
            particle.style.top = (rect.top + rect.height / 2) + 'px';

            // Random direction
            const angle = Math.random() * Math.PI * 2;
            const velocity = Math.random() * 10 + 5;
            const vx = Math.cos(angle) * velocity;
            const vy = Math.sin(angle) * velocity;

            let opac = 1;
            function move() {
                particle.style.left = (parseFloat(particle.style.left) + vx) + 'px';
                particle.style.top = (parseFloat(particle.style.top) + vy) + 'px';
                opac -= 0.02;
                particle.style.opacity = opac;

                if (opac > 0) {
                    requestAnimationFrame(move);
                } else {
                    particle.remove();
                }
            }
            move();
        }

        setInterval(updateTimer, 1000);
    </script>

</body>
</html>
