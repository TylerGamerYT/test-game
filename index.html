<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tyler's Test Site</title>
    <style>
        body {
            margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            min-height: 100vh; font-family: 'Segoe UI', Arial, sans-serif; color: white; text-align: center;
            overflow-x: hidden; transition: background-color 1s ease; background-color: #2980b9;
        }
        .alert-mode { background-color: #222 !important; }
        .danger-text { color: #ff4b4b !important; font-weight: bold; font-size: 1.8rem; text-transform: uppercase; animation: blink 0.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .site-title { font-size: 3rem; font-weight: 900; margin-top: 20px; margin-bottom: 30px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        
        /* --- PFP & DVD STUFF --- */
        #pfp-container { position: relative; width: 140px; height: 140px; margin-bottom: 10px; z-index: 100; transition: 0.3s; }
        img.pfp { 
            width: 100%; border-radius: 50%; border: 4px solid white; cursor: pointer; 
            transition: transform 0.2s; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        img.pfp:hover { transform: scale(1.1); }
        .dvd-mode { position: fixed !important; width: 80px !important; height: 80px !important; z-index: 9999; }

        .username { font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; display: block; }
        .bio-container { max-width: 700px; }
        p { font-size: 1.1rem; line-height: 1.6; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; margin-bottom: 15px; }

        /* --- GALLERY --- */
        #achievements-gallery { display: flex; gap: 15px; margin-top: 10px; flex-wrap: wrap; justify-content: center; transition: 0.5s; }
        .ach-card { background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; width: 150px; border: 2px solid rgba(255,255,255,0.1); }
        .ach-card span { font-weight: bold; font-size: 0.8rem; display: block; color: #f1c40f; text-transform: uppercase; }

        /* --- BOMB UI --- */
        #bomb-wrap { display: none; flex-direction: column; align-items: center; margin-top: 20px; gap: 15px; }
        #bomb { width: 320px; background: #d63031; border-radius: 15px; padding: 20px; box-shadow: 0 15px 40px rgba(0,0,0,0.6); border-left: 15px solid #b71c1c; }
        #timer { background: #111; color: #ff0000; font-family: 'Courier New', monospace; font-size: 2.5rem; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
        .phase-box { background: rgba(0,0,0,0.5); padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        .hidden { display: none !important; }

        /* --- EASTER EGGS --- */
        #crewmate { position: fixed; bottom: 20px; left: -100px; font-size: 50px; transition: 4s linear; z-index: 10000; pointer-events: none; }
        
        /* --- AWARD POPUP --- */
        #award-display { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #f1c40f; color: #000; padding: 35px; border-radius: 25px;
            box-shadow: 0 0 100px rgba(0,0,0,0.9); z-index: 2000; border: 6px solid #fff; min-width: 300px;
        }
    </style>
</head>
<body>

    <div class="site-title">Tyler's Test Site</div>
    
    <div id="pfp-container">
        <img src="https://github.com/TylerGamerYT.png" alt="PFP" class="pfp" id="main-pfp" onclick="toggleDVD()">
    </div>
    
    <span class="username">Tyler / TylerGamerYT</span>

    <div class="bio-container">
        <p id="status-text">
            Hello, I am Tyler, and welcome to my test GitHub.io site. 
            Click my PFP for a surprise, or try typing "sus"...
        </p>
    </div>

    <div id="achievements-gallery">
        <div class="ach-card"><i>🏆</i><span>SURVIVOR</span><p>Disarm with 11s+.</p></div>
        <div class="ach-card" style="border-color: #e67e22;"><i>🔥</i><span>ELITE</span><p>The final 10 seconds.</p></div>
        <div class="ach-card" style="border-color: #c0392b;"><i>💥</i><span>KABOOM!</span><p>Let it blow up.</p></div>
    </div>

    <div id="bomb-wrap">
        <div id="bomb">
            <div id="timer">01:00</div>
            <div id="phase1" class="phase-box">
                <label>PHASE 1: CODE 1234</label><br>
                <input type="text" id="code-input" maxlength="4">
            </div>
            </div>
    </div>

    <div id="award-display">
        <div class="award-icon" id="award-emoji">🏆</div>
        <div class="award-title" id="award-name">THE SURVIVOR</div>
        <div id="award-desc">MISSION ACCOMPLISHED</div>
        <div id="final-message"></div>
    </div>

    <div id="crewmate">📮</div>

    <script>
        // --- DVD PFP LOGIC ---
        let isDVD = false;
        let x = 50, y = 50, xv = 4, yv = 4;
        const pfp = document.getElementById('main-pfp');

        function toggleDVD() {
            isDVD = !isDVD;
            if (isDVD) {
                pfp.classList.add('dvd-mode');
                animateDVD();
            } else {
                pfp.classList.remove('dvd-mode');
                pfp.style.left = "auto"; pfp.style.top = "auto";
                pfp.style.borderColor = "white";
            }
        }

        function animateDVD() {
            if (!isDVD) return;
            let winW = window.innerWidth - 80;
            let winH = window.innerHeight - 80;

            x += xv; y += yv;

            if (x >= winW || x <= 0) {
                xv *= -1;
                pfp.style.borderColor = `hsl(${Math.random() * 360}, 70%, 50%)`;
            }
            if (y >= winH || y <= 0) {
                yv *= -1;
                pfp.style.borderColor = `hsl(${Math.random() * 360}, 70%, 50%)`;
            }

            pfp.style.left = x + 'px';
            pfp.style.top = y + 'px';
            requestAnimationFrame(animateDVD);
        }

        // --- EASTER EGGS (KEYBOARD) ---
        let inputString = "";
        window.addEventListener('keydown', (e) => {
            inputString += e.key.toLowerCase();
            if (inputString.includes("sus")) {
                const cm = document.getElementById('crewmate');
                cm.style.left = "110vw";
                setTimeout(() => { cm.style.left = "-100px"; }, 4000);
                inputString = "";
            }
            if (inputString.includes("creeper")) {
                document.body.style.backgroundColor = "#2ecc71";
                alert("Ssssss.... BOOM!");
                inputString = "";
            }
            if (inputString.length > 10) inputString = "";
        });

        // --- EXISTING BOMB LOGIC ---
        const statusText = document.getElementById('status-text');
        const bombWrap = document.getElementById('bomb-wrap');
        const gallery = document.getElementById('achievements-gallery');
        let gameActive = false, timeLeft = 60;

        setTimeout(() => {
            if(!isDVD) { // Don't start bomb if player is messing with DVD egg
                statusText.innerHTML = "🚨 EMERGENCY! BOMB DETECTED!";
                statusText.classList.add('danger-text');
                gallery.classList.add('hidden');
                bombWrap.style.display = 'flex';
                gameActive = true;
                startTimer();
            }
        }, 20000);

        function startTimer() {
            const countdown = setInterval(() => {
                if(!gameActive) { clearInterval(countdown); return; }
                timeLeft--;
                document.getElementById('timer').innerHTML = `00:${timeLeft < 10 ? '0'+timeLeft : timeLeft}`;
                if(timeLeft <= 0) { clearInterval(countdown); explode(); }
            }, 1000);
        }

        function explode() {
            gameActive = false;
            document.body.style.backgroundColor = "white";
            alert("BOOM! You let it blow up!");
            location.reload();
        }

        document.getElementById('code-input').addEventListener('input', (e) => {
            if(e.target.value === "1234") {
                // In a real site, you'd show Phase 2 here. For this demo, let's just win!
                winGame();
            }
        });

        function winGame() {
            gameActive = false;
            const awardBox = document.getElementById('award-display');
            const name = document.getElementById('award-name');
            awardBox.style.display = "block";
            
            if (timeLeft <= 10) {
                name.innerText = `THE ${timeLeft}s ELITE`;
                awardBox.style.background = "orange";
            } else {
                name.innerText = "THE SURVIVOR";
            }
            setTimeout(() => location.reload(), 5000);
        }
    </script>
</body>
</html>
