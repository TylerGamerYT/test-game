<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tyler's Ultimate Test Site</title>
    <style>
        :root {
            --accent: #f1c40f;
            --bg: #1a1a1a;
            --danger: #d63031;
            --card-orange: #e67e22;
        }

        body {
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            text-align: center;
            overflow-x: hidden;
            transition: background-color 1s ease, color 0.5s ease;
            background-color: #222;
        }

        /* --- AUTH SYSTEM --- */
        #auth-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #111;
            z-index: 20000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .auth-box {
            background: #222;
            padding: 30px;
            border-radius: 20px;
            border: 3px solid var(--accent);
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            width: 300px;
        }

        @keyframes boxShake {
            0% { transform: translateX(0); }
            25% { transform: translateX(10px); }
            50% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
            100% { transform: translateX(0); }
        }

        .auth-box input {
            width: 90%;
            padding: 10px;
            margin: 10px 0;
            background: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 5px;
        }

        .auth-btn {
            background: var(--accent);
            color: black;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 5px;
            width: 100%;
            margin-top: 10px;
        }

        /* --- THEMES --- */
        .theme-matrix { --bg: #000; --accent: #0f0; color: #0f0 !important; font-family: 'Courier New', monospace; }
        .theme-cyber { --bg: #2d0036; --accent: #00fff2; color: #00fff2 !important; }
        .theme-gameboy { --bg: #8bac0f; --accent: #306230; color: #306230 !important; }
        .alert-active { background-color: #0f0f0f !important; }

        #site-title {
            font-size: 3.5rem;
            font-weight: 900;
            margin-top: 20px;
            margin-bottom: 5px;
            text-shadow: 0 5px 15px rgba(0,0,0,0.5);
            cursor: pointer;
            user-select: none;
            transition: 0.3s;
        }

        #top-right-ui {
            position: fixed;
            top: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .ui-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.2);
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        #pfp-wrapper {
            position: relative;
            width: 160px;
            height: 160px;
            margin-bottom: 10px;
        }

        img.pfp {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid white;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .dvd-mode {
            position: fixed !important;
            width: 110px !important;
            height: 110px !important;
            z-index: 9999;
            border-radius: 20% !important;
        }

        #bomb-container {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            max-width: 400px;
        }

        #bomb-case {
            width: 100%;
            background: #d63031;
            border-radius: 25px;
            padding: 30px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
        }

        #digital-timer {
            background: #050505;
            color: #ff0000;
            font-family: 'Courier New', monospace;
            font-size: 4rem;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .game-step { background: rgba(0,0,0,0.7); padding: 25px; border-radius: 15px; margin-bottom: 15px; }
        .hidden { display: none !important; }

        .wire-set { display: flex; justify-content: center; gap: 12px; margin-top: 20px; }
        .wire-strand { width: 25px; height: 60px; cursor: pointer; border-radius: 6px; }
        .wire-strand.cut { height: 18px; opacity: 0.1; background: #000 !important; }

        #gyro-track { height: 20px; background: #222; width: 100%; border-radius: 20px; margin-top: 15px; }
        #gyro-fill { height: 100%; background: #00ff00; width: 0%; transition: width 0.1s; }

        #award-card {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: var(--card-orange);
            color: #000;
            padding: 40px;
            border-radius: 35px;
            z-index: 5000;
            border: 8px solid #fff;
        }

        #lab-panel {
            display: none;
            background: #111;
            padding: 25px;
            border-radius: 20px;
            position: fixed;
            top: 80px; right: 20px;
            border: 3px solid gold;
            width: 200px;
            z-index: 5000;
        }

        #sprite-sus { position: fixed; bottom: 30px; left: -180px; font-size: 75px; transition: 3s linear; z-index: 10000; }
        #sprite-bus { position: fixed; top: 20%; left: -250px; font-size: 70px; transition: 5s linear; z-index: 10000; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <h1 style="color:var(--accent);">TYLER'S SITE</h1>
        <div class="auth-box" id="login-box">
            <h2>Login</h2>
            <input type="text" id="auth-user" placeholder="Username">
            <input type="password" id="auth-pass" placeholder="Password">
            <button class="auth-btn" onclick="handleAuth()">GO</button>
            <p id="auth-msg" style="color:red;"></p>
        </div>
    </div>

    <div id="top-right-ui">
        <button class="ui-btn" onclick="toggleAudio()" id="music-btn">📻</button>
        <button class="ui-btn" onclick="openLab()">🧪</button>
        <button class="ui-btn" onclick="logout()">🚪</button>
    </div>

    <div id="site-title" onclick="labCounter()">Tyler's Test Site</div>
    
    <div id="pfp-wrapper">
        <img src="https://github.com/TylerGamerYT.png" class="pfp" id="main-pfp" onclick="toggleDVD()">
    </div>
    
    <span id="display-username" style="font-size: 2rem; font-weight: 800;">Tyler</span>

    <div id="intro-bio">
        <p>Welcome to my test site. Use code 1234 for the keypad.</p>
    </div>

    <div id="bomb-container">
        <div id="bomb-case">
            <div id="digital-timer">01:00</div>
            <div id="step-1" class="game-step">
                <label>STEP 1: CODE 1234</label>
                <input type="text" id="input-code" maxlength="4" style="font-size:2rem; width:100px; text-align:center;">
            </div>
            <div id="step-2" class="game-step hidden">
                <label>STEP 2: SLIDE TO 50%</label>
                <input type="range" id="slider-freq" min="0" max="100" value="0">
                <div id="freq-readout">0%</div>
            </div>
            <div id="step-3" class="game-step hidden">
                <label>STEP 3: CUT ALL WIRES</label>
                <div class="wire-set" id="wire-grid"></div>
            </div>
            <div id="step-4" class="game-step hidden">
                <label>STEP 4: HOLD STILL!</label>
                <div id="gyro-track"><div id="gyro-fill"></div></div>
            </div>
            <div id="step-5" class="game-step hidden">
                <button onclick="triggerWin()" style="padding:20px; width:100%;">DISARM</button>
            </div>
        </div>
    </div>

    <div id="award-card">
        <h1>BOMB DISARMED</h1>
        <p id="award-main-text">SUCCESS</p>
        <button onclick="location.reload()">PLAY AGAIN</button>
    </div>

    <div id="lab-panel">
        <h3>THE LAB</h3>
        <button onclick="applyTheme('matrix')">MATRIX</button>
        <button onclick="applyTheme('cyber')">CYBER</button>
        <button onclick="applyTheme('gameboy')">GAMEBOY</button>
        <button onclick="closeLab()">CLOSE</button>
    </div>

    <div id="sprite-sus">📮</div>
    <div id="sprite-bus">🚌💨</div>

    <script src="script.js"></script>
</body>
</html>
